controllers:
    resource:
        path: ../src/Controller/
        namespace: App\Controller
    type: attribute

# Logout is intercepted by the security firewall (see config/packages/security.yaml).
app_logout:
    path: /logout
    methods: [GET]

home:
    path: /
    controller: Symfony\Bundle\FrameworkBundle\Controller\RedirectController
    defaults:
        route: dashboard
        permanent: false
